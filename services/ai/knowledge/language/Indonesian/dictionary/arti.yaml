meaning: |
  Arti atau makna adalah hubungan antara lambang bunyi dengan acuannya. Makna merupakan bentuk responsi dari stimulus yang diperoleh pemeran dalam komunikasi sesuai dengan asosiasi maupun hasil belajar yang dimiliki. Makna terbagi ke dalam dua kelompok besar: speaker-sense dan linguistic-sense. Yang disebut pertama merujuk pada tujuan atau niat pembicara ketika mengatakan sesuatu. Sedangkan yang disebut terakhir merujuk pada makna linguistik yakni yang lazim dipersepsi penutur bahasa. Yakni makna secara literal, dan ini merupakan bagian dari semantik. Berikut adalah sejumlah sifat-sifat dan relasi makna yang lazim dibahas oleh semantik: ambiguitas leksikal, sinonimi, hiponimi, overlap dan antonimi. Ambiguitas leksikak terjadi tatkala satu kata memiliki lebih dari dua arti. Sinonimi adalah sejumlah katayang memiliki makna yang sama. Hiponimi adalah satu kata yang artinya mencakupi keseluruhan makna kata lainnya. Overlap adalah fenomena semantis tatkala dua kata atau lebih bertumpang-tindih fitur semantiknya. Antonim adalah dua kata yang berlawanan artinya.

