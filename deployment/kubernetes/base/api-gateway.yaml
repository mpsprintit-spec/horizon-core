apiVersion: apps/v1
kind: Deployment
metadata:
  name: horizon-api-gateway
  labels:
    app.kubernetes.io/name: horizon-api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: horizon-api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: horizon-api-gateway
    spec:
      containers:
        - name: api-gateway
          image: horizon-core/api-gateway:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: horizon-api-gateway
spec:
  selector:
    app.kubernetes.io/name: horizon-api-gateway
  ports:
    - port: 80
      targetPort: 8080
